metadata:
  purpose: "Schema and business context for Qwen SQL generation."
  sources:
    - "GenAI_Agentic_Test.pdf section 3.1 for table purposes and views."
    - "GenAI_Agentic_Test.pdf section 4.5 for business rules."
    - "Data/seed.sql for constraints, inserted values, and comments."
  note: "Meanings are derived from the assignment and seed data; not every sentence is a verbatim quote."

schema:
  tables:
    machines:
      purpose: "Each machine with daily capacity and current availability."
      columns:
        machine_id: "Stable machine identifier such as M1 or M4."
        machine_name: "Human-readable machine name."
        machine_type: "Machine category, for example CNC Mill, Press, Laser, Welding, Grinder."
        capacity_hours_day: "Normal daily machine capacity in hours."
        current_status: "Current availability state: available, partial, or unavailable."
        available_hours_today: "Actual usable hours remaining today after downtime or partial availability."
        location: "Factory bay location."
        notes: "Operational notes, often useful for explaining risk causes."

    work_orders:
      purpose: "Production orders to be scheduled, processed, delayed, completed, or held."
      columns:
        wo_id: "Stable work order identifier such as WO-1003."
        product_code: "Product being produced; joins to products.product_code."
        quantity: "Number of units in the order."
        required_machine: "Machine needed to process this order; joins to machines.machine_id."
        processing_time_hr: "Required processing time in machine hours."
        priority: "Business urgency from 1 to 5. 1 is most critical, 5 is lowest."
        due_date: "Date the work order should be completed."
        status: "Order status: pending, in_progress, completed, delayed, or on_hold."
        notes: "Planner notes explaining constraints or risk."

    downtime_schedule:
      purpose: "Planned and unplanned machine downtime windows."
      columns:
        machine_id: "Machine affected by downtime."
        downtime_date: "Date of downtime."
        start_time: "Downtime start time."
        end_time: "Downtime end time."
        duration_hours: "Generated duration in hours."
        downtime_type: "planned, unplanned, or calibration."
        description: "Reason for downtime."

    products:
      purpose: "Product catalogue used to make answers readable."
      columns:
        product_code: "Stable product identifier."
        product_name: "Human-readable product name."
        product_family: "Product category or family."
        unit_weight_kg: "Unit weight."
        notes: "Product-specific manufacturing notes."

    agent_action_log:
      purpose: "Audit trail for agent actions. Do not use this table to answer scheduling questions unless asked about agent history."
      columns:
        session_id: "Conversation or request session identifier."
        action_type: "Type of agent action."
        input_question: "Original user question."
        sql_generated: "SQL generated by the agent."
        result_summary: "Short summary of result."
        confidence: "Agent confidence from 0 to 1."
        created_at: "Action timestamp."

  views:
    v_machine_load:
      purpose: "Machine load summary. Best view for overload and capacity questions."
      columns:
        machine_id: "Machine identifier."
        machine_name: "Human-readable machine name."
        machine_type: "Machine category."
        capacity_hours_day: "Normal daily machine capacity in hours."
        available_hours_today: "Actual usable hours remaining today."
        current_status: "Current availability state: available, partial, or unavailable."
        queued_hours: "Total pending/in-progress processing hours assigned to the machine."
        load_pct: "queued_hours divided by capacity_hours_day times 100."

    v_at_risk_orders:
      purpose: "Orders that cannot complete given current status, machine availability, or due date."
      columns:
        wo_id: "Work order identifier."
        product_code: "Product being produced."
        quantity: "Number of units in the order."
        required_machine: "Machine needed to process this order."
        processing_time_hr: "Required processing time in machine hours."
        priority: "Business urgency from 1 to 5. 1 is most critical, 5 is lowest."
        due_date: "Date the work order should be completed."
        status: "Order status."
        available_hours_today: "Actual usable hours remaining today."
        machine_status: "Machine availability state."
        risk_reason: "Human-readable reason the order is risky."

    v_priority_queue:
      purpose: "Orders due within the next 3 days, ranked by priority."
      columns:
        wo_id: "Work order identifier."
        product_code: "Product being produced."
        product_name: "Human-readable product name."
        quantity: "Number of units in the order."
        required_machine: "Machine needed to process this order."
        processing_time_hr: "Required processing time in machine hours."
        priority: "Business urgency from 1 to 5. 1 is most critical, 5 is lowest."
        due_date: "Date the work order should be completed."
        status: "Order status."
        days_remaining: "due_date minus CURRENT_DATE."

known_values:
  machines:
    machine_id: ["M1", "M2", "M3", "M4", "M5", "M6", "M7", "M8"]
    current_status: ["available", "partial", "unavailable"]
    machine_type: ["CNC Mill", "Press", "Laser", "Mill", "Welding", "Grinder"]
    location: ["Bay A", "Bay B", "Bay C", "Bay D"]

  work_orders:
    status: ["pending", "in_progress", "completed", "delayed", "on_hold"]
    priority:
      "1": "Critical"
      "2": "High"
      "3": "Medium"
      "4": "Low"
      "5": "Backlog"
    product_code: ["PART-A", "PART-B", "PART-C", "PART-D", "PART-E", "PART-F", "PART-G", "PART-H", "PART-I", "PART-J"]

  downtime_schedule:
    downtime_type: ["planned", "unplanned", "calibration"]

  products:
    product_family: ["Drive Train", "Engine", "Fluid Systems", "Automation", "Frame"]

business_rules:
  load_status:
    - "Overloaded means load_pct > 100."
    - "At risk means load_pct > 85 and <= 100."
    - "Normal means load_pct <= 85."
  delay_detection:
    - "status = delayed means already delayed."
    - "pending or in_progress with due_date <= CURRENT_DATE should be treated as at risk."
    - "pending order on an unavailable machine is blocked."

do_not_embed_live_records:
  - "Do not list every work order in prompt context."
  - "Do not hardcode due dates, quantities, notes, started_at, or completed_at in YAML."
  - "Query live operational records from PostgreSQL instead."
