# Build the API container.
# Start PostgreSQL.
# Load seed.sql.
# Start Ollama.
# Start FastAPI.
# Connect everything on the same Docker network.

services:
  db:
    image: postgres:16
    container_name: scheduling_db
    environment:
      POSTGRES_DB: scheduling_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./Data/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d scheduling_db" ]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama
    container_name: scheduling_ollama
    volumes:
      - ollama_data:/root/.ollama

  ollama-pull:
    image: ollama/ollama
    container_name: scheduling_ollama_pull
    env_file:
      - .env.example
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ollama_data:/root/.ollama
    depends_on:
      ollama:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command: ["until ollama list; do sleep 2; done; ollama pull $${LLM_ROUTER_MODEL}; ollama pull $${LLM_SQL_MODEL}; ollama pull $${LLM_ANSWER_MODEL}"]

  api:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: scheduling_api
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully

volumes:
  pg_data:
  ollama_data:
