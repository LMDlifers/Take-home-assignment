<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Planning Copilot</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f8;
      --surface: #ffffff;
      --surface-soft: #f3f4f6;
      --surface-hover: #ececf1;
      --ink: #202123;
      --muted: #6b7280;
      --line: #d9d9e3;
      --accent: #10a37f;
      --accent-dark: #0d8f70;
      --danger: #c2413b;
      --sidebar: #202123;
      --sidebar-ink: #f7f7f8;
      --sidebar-muted: #c5c5d2;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 15px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 100vh;
      padding: 16px;
      background: var(--sidebar);
      color: var(--sidebar-ink);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      font-weight: 720;
      letter-spacing: 0;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      color: #9ff2d6;
      font-weight: 800;
    }

    .nav,
    .examples {
      display: grid;
      gap: 8px;
    }

    .nav a,
    .examples button {
      width: 100%;
      min-height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: transparent;
      color: var(--sidebar-ink);
      text-align: left;
      padding: 9px 11px;
      font-size: 14px;
    }

    .nav a:hover,
    .examples button:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .sidebar h2 {
      margin: 0 0 8px;
      color: var(--sidebar-muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .sidebar-foot {
      margin-top: auto;
      color: var(--sidebar-muted);
      font-size: 12px;
    }

    .chat {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 58px;
      padding: 12px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(247, 247, 248, 0.9);
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0;
      font-size: 17px;
      font-weight: 720;
      letter-spacing: 0;
    }

    .state {
      color: var(--muted);
      font-size: 13px;
    }

    .thread {
      flex: 1;
      width: min(900px, 100%);
      margin: 0 auto;
      padding: 26px 22px 168px;
    }

    .message {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 14px;
      padding: 20px 0;
    }

    .avatar {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 4px;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
    }

    .user .avatar {
      background: #353740;
    }

    .bubble {
      min-width: 0;
    }

    .bubble p {
      margin: 0;
    }

    .message-title {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .summary {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 650;
    }

    .suggestions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .suggestions button {
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface);
      color: var(--ink);
      text-align: left;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 620;
    }

    .suggestions button:hover {
      background: var(--surface-hover);
    }

    .suggestions button:disabled {
      cursor: wait;
      opacity: 0.6;
    }

    .loading {
      max-width: 420px;
      margin-top: 2px;
    }

    .loading-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .loading-percent {
      font-variant-numeric: tabular-nums;
    }

    .progress-track {
      height: 6px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--surface-hover);
    }

    .progress-fill {
      height: 100%;
      width: 10%;
      border-radius: inherit;
      background: var(--accent);
      transition: width 420ms ease;
    }

    details {
      margin-top: 12px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    pre {
      max-height: 320px;
      overflow: auto;
      margin: 10px 0 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111827;
      color: #edf2ff;
      font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .composer-wrap {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 280px;
      padding: 18px 22px 20px;
      background: linear-gradient(rgba(247, 247, 248, 0), var(--bg) 28%);
    }

    .composer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 44px;
      gap: 8px;
      width: min(900px, 100%);
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
      padding: 10px;
    }

    textarea {
      width: 100%;
      min-height: 44px;
      max-height: 180px;
      resize: vertical;
      border: 0;
      background: transparent;
      color: var(--ink);
      outline: none;
      padding: 10px 8px;
    }

    textarea::placeholder {
      color: var(--muted);
    }

    .send {
      align-self: end;
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 20px;
      line-height: 1;
    }

    .send svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .send:hover {
      background: var(--accent-dark);
    }

    .send:disabled {
      cursor: wait;
      opacity: 0.55;
    }

    .error-text {
      color: var(--danger);
    }

    @media (max-width: 860px) {
      .app {
        display: block;
      }

      .sidebar {
        min-height: auto;
        padding: 12px;
      }

      .nav,
      .examples {
        display: flex;
        overflow-x: auto;
        padding-bottom: 2px;
      }

      .nav a,
      .examples button {
        flex: 0 0 auto;
        width: auto;
        white-space: nowrap;
      }

      .sidebar-foot {
        display: none;
      }

      .thread {
        padding: 18px 14px 168px;
      }

      .topbar {
        padding: 12px 14px;
      }

      .suggestions {
        grid-template-columns: 1fr;
      }

      .composer-wrap {
        left: 0;
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">AI</div>
        <div>Planning Copilot</div>
      </div>

      <nav class="nav" aria-label="API links">
        <a href="/docs">Swagger docs</a>
        <a href="/api/v1/health">Health check</a>
        <a href="/api/v1/machines/load">Machine load</a>
        <a href="/api/v1/orders/at-risk">At-risk orders</a>
      </nav>

      <div>
        <h2>Assessment prompts</h2>
        <div class="examples" aria-label="Assessment prompts">
          <button type="button" data-question="Which work orders are delayed?">Delayed work orders</button>
          <button type="button" data-question="Which machines are overloaded?">Overloaded machines</button>
          <button type="button" data-question="Why is WO-1003 at risk?">Why WO-1003 is at risk</button>
          <button type="button" data-question="What happens if M2 is down for 4 extra hours?">M2 down 4 hours</button>
          <button type="button" data-question="Show high-priority orders due this week.">High priority due soon</button>
          <button type="button" data-question="Recommend actions to reduce delays.">Recommended actions</button>
        </div>
      </div>

      <div class="sidebar-foot">FastAPI / PostgreSQL / Ollama</div>
    </aside>

    <main class="chat">
      <header class="topbar">
        <h1>Shop floor scheduling agent</h1>
        <div class="state" id="state">Ready</div>
      </header>

      <section class="thread" id="thread" aria-live="polite">
        <article class="message assistant">
          <div class="avatar">AI</div>
          <div class="bubble">
            <div class="message-title">Planning Copilot</div>
            <p>Ask about work orders, machine load, downtime, priority, risk, or recommended actions.</p>
            <div class="suggestions">
              <button type="button" data-question="Which work orders are delayed?">Which work orders are delayed?</button>
              <button type="button" data-question="Which machines are overloaded?">Which machines are overloaded?</button>
              <button type="button" data-question="Why is WO-1003 at risk?">Why is WO-1003 at risk?</button>
              <button type="button" data-question="What happens if M2 is down for 4 extra hours?">What happens if M2 is down for 4 extra hours?</button>
            </div>
          </div>
        </article>
      </section>

      <form class="composer-wrap" id="form">
        <div class="composer">
          <textarea id="question" rows="1" placeholder="Ask a scheduling question">Which machines are overloaded?</textarea>
          <button class="send" id="ask" type="submit" aria-label="Send question">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5l6 6m-6-6l-6 6m6-6v14" />
            </svg>
          </button>
        </div>
      </form>
    </main>
  </div>

  <script>
    const thread = document.querySelector("#thread");
    const form = document.querySelector("#form");
    const question = document.querySelector("#question");
    const ask = document.querySelector("#ask");
    const state = document.querySelector("#state");
    const promptButtons = Array.from(document.querySelectorAll("[data-question]"));

    promptButtons.forEach((button) => {
      button.addEventListener("click", () => {
        question.value = button.dataset.question;
        submitQuestion();
      });
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      submitQuestion();
    });

    question.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        submitQuestion();
      }
    });

    async function submitQuestion() {
      const text = question.value.trim();
      if (!text || ask.disabled) {
        return;
      }

      addMessage("user", "You", text);
      question.value = "";
      setBusy(true);
      state.textContent = "Thinking";

      const thinking = addMessage("assistant", "Planning Copilot", "");
      startLoading(thinking);

      try {
        const response = await fetch("/api/v1/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: text })
        });
        const payload = await response.json();
        if (!response.ok) {
          stopLoading(thinking);
          updateMessage(thinking, "Request failed", JSON.stringify(payload, null, 2), true);
          return;
        }
        await finishLoading(thinking);
        renderResponse(thinking, payload);
      } catch (error) {
        stopLoading(thinking);
        updateMessage(thinking, "Request failed", error.message || String(error), true);
      } finally {
        setBusy(false);
        state.textContent = "Ready";
        question.focus();
      }
    }

    function addMessage(role, title, text) {
      const article = document.createElement("article");
      article.className = `message ${role}`;
      article.innerHTML = `
        <div class="avatar">${role === "user" ? "You" : "AI"}</div>
        <div class="bubble">
          <div class="message-title"></div>
          <p></p>
        </div>
      `;
      article.querySelector(".message-title").textContent = title;
      article.querySelector("p").textContent = text;
      thread.append(article);
      article.scrollIntoView({ block: "end", behavior: "smooth" });
      return article;
    }

    function setBusy(isBusy) {
      ask.disabled = isBusy;
      promptButtons.forEach((button) => {
        button.disabled = isBusy;
      });
    }

    function startLoading(article) {
      const bubble = article.querySelector(".bubble");
      const stages = [
        ["Checking request", 12],
        ["Routing intent", 32],
        ["Retrieving scheduling data", 55],
        ["Building answer", 74],
        ["Judging confidence", 90]
      ];
      const measuredAverageResponseMs = 12;
      const stageIntervalMs = Math.max(Math.round(measuredAverageResponseMs / (stages.length - 1)), 300);
      let index = 0;
      bubble.innerHTML = `
        <div class="message-title">Planning Copilot</div>
        <div class="loading" aria-live="polite" aria-label="Request progress">
          <div class="loading-row">
            <span class="loading-stage"></span>
            <span class="loading-percent"></span>
          </div>
          <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="12">
            <div class="progress-fill"></div>
          </div>
        </div>
      `;

      const setStage = (stage) => {
        bubble.querySelector(".loading-stage").textContent = stage[0];
        bubble.querySelector(".loading-percent").textContent = `${stage[1]}%`;
        bubble.querySelector(".progress-track").setAttribute("aria-valuenow", String(stage[1]));
        bubble.querySelector(".progress-fill").style.width = `${stage[1]}%`;
      };

      setStage(stages[index]);
      article.loadingTimer = window.setInterval(() => {
        index = Math.min(index + 1, stages.length - 1);
        setStage(stages[index]);
      }, stageIntervalMs);
    }

    function stopLoading(article) {
      if (article.loadingTimer) {
        window.clearInterval(article.loadingTimer);
        article.loadingTimer = null;
      }
    }

    function finishLoading(article) {
      stopLoading(article);
      const loading = article.querySelector(".loading");
      if (!loading) {
        return Promise.resolve();
      }
      loading.querySelector(".loading-stage").textContent = "Complete";
      loading.querySelector(".loading-percent").textContent = "100%";
      loading.querySelector(".progress-track").setAttribute("aria-valuenow", "100");
      loading.querySelector(".progress-fill").style.width = "100%";
      return new Promise((resolve) => window.setTimeout(resolve, 220));
    }

    function updateMessage(article, title, text, isError = false) {
      stopLoading(article);
      article.querySelector(".message-title").textContent = title;
      let paragraph = article.querySelector("p");
      if (!paragraph) {
        paragraph = document.createElement("p");
        article.querySelector(".bubble").append(paragraph);
      }
      paragraph.textContent = text;
      paragraph.classList.toggle("error-text", isError);
      article.scrollIntoView({ block: "end", behavior: "smooth" });
    }

    function renderResponse(article, payload) {
      stopLoading(article);
      const rows = Array.isArray(payload.data) ? payload.data.length : 0;
      const bubble = article.querySelector(".bubble");
      bubble.innerHTML = `
        <div class="message-title">Planning Copilot</div>
        <p>${escapeHtml(payload.answer || "No answer returned.")}</p>
        <div class="summary">
          <span class="pill">Tool: ${escapeHtml(payload.tool_used ?? "-")}</span>
          <span class="pill">Confidence: ${escapeHtml(String(payload.confidence ?? "-"))}</span>
          <span class="pill">Rows: ${rows}</span>
        </div>
        <details open>
          <summary>Explanation</summary>
          <pre>${escapeHtml(payload.explanation || "")}</pre>
        </details>
        <details>
          <summary>SQL used</summary>
          <pre>${escapeHtml(payload.sql_used || "None")}</pre>
        </details>
        <details>
          <summary>Data</summary>
          <pre>${escapeHtml(JSON.stringify(payload.data ?? [], null, 2))}</pre>
        </details>
        <details>
          <summary>Trace</summary>
          <pre>${escapeHtml(JSON.stringify(payload.trace ?? [], null, 2))}</pre>
        </details>
      `;
      article.scrollIntoView({ block: "end", behavior: "smooth" });
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
